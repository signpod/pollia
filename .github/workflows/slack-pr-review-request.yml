name: Notify Slack on PR Review Request

on:
  pull_request:
    types: [review_requested]

jobs:
  slack:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare notification data
        id: prepare
        env:
          REPOSITORY: ${{ github.event.repository.name }}
          TITLE: ${{ github.event.pull_request.title }}
          NUMBER: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          REVIEWER: ${{ github.event.requested_reviewer.login }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          URL: ${{ github.event.pull_request.html_url }}
        run: |
          PAYLOAD=$(node -e "
            const text = \`📝 *[PR REVIEW REQUEST]* *\${process.env.REPOSITORY}* - \${process.env.TITLE} (#\${process.env.NUMBER})
          👤 *Author:* \${process.env.AUTHOR}
          👀 *Reviewer:* \${process.env.REVIEWER}
          🔀 *Branch:* \\\`\${process.env.BRANCH}\\\`
          🔗 \${process.env.URL}\`;
            console.log(JSON.stringify({ text }));
          ")
          echo "payload=$PAYLOAD" >> $GITHUB_OUTPUT

      - name: Send notification to Slack
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: ${{ steps.prepare.outputs.payload }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

