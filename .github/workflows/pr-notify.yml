name: Notify Slack on PR
on:
  pull_request:
    types: [opened, reopened, closed]

jobs:
  slack:
    runs-on: ubuntu-latest
    steps:
      - name: Send PR notification to Slack
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "${{ 
                github.event.action == 'closed' && github.event.pull_request.merged == true && '🚀 [PR MERGED]' || 
                github.event.action == 'closed' && '❌ [PR CLOSED]' || 
                '💬 [PR OPEN]' 
              }} *${{ github.event.repository.name }}* - ${{ github.event.pull_request.title }} (#${{ github.event.pull_request.number }})\n👤 *Author:* ${{ github.actor }}\n🔀 *Branch:* `${{ github.head_ref }}`\n🔗 ${{ github.event.pull_request.html_url }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
