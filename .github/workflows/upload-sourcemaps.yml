name: Upload Source Maps to Rollbar

on:
  push:
    branches: [main]

jobs:
  upload-sourcemaps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate Prisma Client
        working-directory: apps/web
        run: npx prisma generate

      - name: Build with source maps
        working-directory: apps/web
        env:
          NEXT_PUBLIC_ROLLBAR_CODE_VERSION: ${{ github.sha }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_SECRET_KEY: ${{ secrets.SUPABASE_SERVICE_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_ROLLBAR_CLIENT_TOKEN: ${{ secrets.NEXT_PUBLIC_ROLLBAR_CLIENT_TOKEN }}
          ROLLBAR_SERVER_TOKEN: ${{ secrets.ROLLBAR_SERVER_TOKEN }}
          NEXT_PUBLIC_KAKAO_JS_KEY: ${{ secrets.NEXT_PUBLIC_KAKAO_JS_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          NEXT_PUBLIC_PRIVACY_POLICY_URL: ${{ secrets.NEXT_PUBLIC_PRIVACY_POLICY_URL }}
          NEXT_PUBLIC_INQUIRY_URL: ${{ secrets.NEXT_PUBLIC_INQUIRY_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          MISSION_PASSWORD_SECRET_KEY: ${{ secrets.MISSION_PASSWORD_SECRET_KEY }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          MISSION_REPORT_NOTION_API_KEY: ${{ secrets.MISSION_REPORT_NOTION_API_KEY }}
          MISSION_REPORT_NOTION_DATABASE_ID: ${{ secrets.MISSION_REPORT_NOTION_DATABASE_ID }}
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_SEARCH_API_KEY: ${{ secrets.ALGOLIA_SEARCH_API_KEY }}
          ALGOLIA_WRITE_API_KEY: ${{ secrets.ALGOLIA_WRITE_API_KEY }}
          ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        run: yarn build

      - name: Upload source maps to Rollbar
        working-directory: apps/web
        env:
          ROLLBAR_SERVER_TOKEN: ${{ secrets.ROLLBAR_SERVER_TOKEN }}
          NEXT_PUBLIC_APP_URL: https://pollia.me
          NEXT_PUBLIC_ROLLBAR_CODE_VERSION: ${{ github.sha }}
        run: node scripts/upload-sourcemaps.cjs
