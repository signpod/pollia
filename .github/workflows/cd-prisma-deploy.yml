name: CD - Prisma Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Check for Prisma changes
        id: prisma-changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^apps/web/prisma/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Enable Corepack
        if: steps.prisma-changes.outputs.changed == 'true'
        run: corepack enable
      
      - name: Setup Node.js
        if: steps.prisma-changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
      
      - name: Install dependencies
        if: steps.prisma-changes.outputs.changed == 'true'
        run: yarn install --immutable
      
      - name: Deploy Prisma Migrations
        if: steps.prisma-changes.outputs.changed == 'true'
        working-directory: apps/web
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
        run: yarn db:deploy
      
      - name: Trigger Vercel Deploy
        run: curl -X POST ${{ secrets.VERCEL_PRODUCTION_DEPLOY_HOOK_URL }}